<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KhataBook — Business Ledger</title>
  <meta name="description" content="Digital lending notebook for individual business owners. Track customer balances, lent amounts, and repayments with a complete audit trail." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  
  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="app-shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-orb" aria-hidden="true">₹</div>
          <div class="brand-copy">
            <span class="brand-name">KhataBook</span>
            <span class="brand-sub">Business Ledger</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav" role="navigation">
        <a href="#/dashboard" class="nav-link" id="nav-dashboard" data-route="dashboard">
          <span class="nav-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#/customers" class="nav-link" id="nav-customers" data-route="customers">
          <span class="nav-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </span>
          <span class="nav-label">Customers</span>
        </a>
      </nav>

<div class="sidebar-footer">
        <button class="btn btn-ghost btn-export" id="export-btn" aria-label="Export all data" style="margin-bottom: 12px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export Data
        </button>
        <div class="sidebar-user-block" id="sidebar-user-block" style="display: none;">
          <div class="sidebar-user-info">
            <div class="user-avatar-small">👤</div>
            <div class="user-email-text" id="sidebar-user-email"></div>
          </div>
          <button class="btn-signout" id="signout-btn" aria-label="Sign out">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign Out
          </button>
        </div>
        <div class="sidebar-badge" style="display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; color: var(--text-tertiary);">
          <span style="width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green);"></span>
          Live Database
        </div>
      </div>
    </aside>

    <!-- ── Main area ── -->
    <div class="main-wrapper">
      <header class="topbar" id="topbar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle sidebar" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="topbar-title" id="topbar-title">Dashboard</h1>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>

      <main class="main-content" id="main-content" role="main">
        <div id="page-root">
          <!-- pages render here -->
          <div class="page-loading" id="initial-loader">
            <div class="spinner"></div>
          </div>
        </div>
      </main>
    </div>

  </div><!-- /.app-shell -->

  <!-- ── Confirmation Modal ── -->
  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true"></div>
  <div class="modal-frame" id="modal-frame" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true"></div>

  <!-- ── Export Modal ── -->
  <div class="modal-backdrop" id="export-backdrop" aria-hidden="true"></div>
  <div class="modal-frame" id="export-frame" role="dialog" aria-modal="true" aria-labelledby="export-title" aria-hidden="true"></div>

  <!-- ── Toast stack ── -->
  <div class="toast-stack" id="toast-stack" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
